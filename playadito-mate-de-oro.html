<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Playadito - Mate de Oro</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Lilita+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--yd:#F5C518;--dk:#2D5016;--gn:#3A6B1E;--gd:#FFD700;--gdd:#B8860B}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Fredoka',sans-serif;touch-action:manipulation}
body{display:flex;flex-direction:column;align-items:center;min-height:100dvh;
background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,.25)0%,transparent 50%),
radial-gradient(ellipse at 70% 80%,rgba(45,80,22,.08)0%,transparent 50%),
linear-gradient(180deg,#F5C518 0%,#E8B30E 40%,#D4A00A 100%);position:relative}
body::before{content:'';position:fixed;inset:0;
background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M15 5 Q20 15 15 25 Q10 15 15 5Z' fill='%232D5016' opacity='.04'/%3E%3Cpath d='M45 35 Q50 45 45 55 Q40 45 45 35Z' fill='%232D5016' opacity='.04'/%3E%3C/svg%3E");
pointer-events:none;z-index:0}
.gc{position:relative;z-index:1;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;padding:10px 16px 14px;height:100dvh}
.hdr{width:100%;display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:6px;flex-shrink:0}
.logo{height:72px}.logo img{height:100%;width:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.18))}
.sub{font-family:'Lilita One',sans-serif;font-size:19px;color:var(--dk);text-transform:uppercase;letter-spacing:3px;text-shadow:0 1px 0 rgba(255,255,255,.4)}
.inst{font-size:12px;color:var(--gn);opacity:.85;text-align:center;line-height:1.3}
.abar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;flex-shrink:0}
.adot{width:38px;height:38px;border-radius:50%;background:var(--dk);display:flex;align-items:center;justify-content:center;font-size:18px;
box-shadow:0 2px 8px rgba(0,0,0,.15);opacity:.3;transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.adot.used{opacity:1;background:#8B0000;transform:scale(1.1)}
.adot.gold{opacity:1;background:linear-gradient(135deg,var(--gd),var(--gdd));transform:scale(1.15);box-shadow:0 0 16px rgba(255,215,0,.6)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,1fr);gap:10px;width:100%;flex:1;max-height:calc(100dvh - 190px)}
.card{perspective:800px;cursor:pointer;-webkit-user-select:none;user-select:none}
.card.disabled{pointer-events:none}
.ci{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.card.flipped .ci{transform:rotateY(180deg)}
.cf{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:hidden}
.cb{background:linear-gradient(145deg,var(--dk) 0%,#1a3d0a 100%);border:3px solid rgba(255,255,255,.15);box-shadow:0 4px 16px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.1)}
.cb::before{content:'';position:absolute;inset:6px;border:2px dashed rgba(255,255,255,.12);border-radius:10px}
.cb .qm{font-family:'Lilita One',sans-serif;font-size:40px;color:rgba(255,255,255,.85);text-shadow:0 2px 4px rgba(0,0,0,.3);line-height:1}
.cb .th{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.cfr{transform:rotateY(180deg);border:3px solid rgba(0,0,0,.06);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.cfr .ic{display:flex;align-items:center;justify-content:center;width:100%;flex:1;min-height:0}
.cfr .cimg{width:65%;height:auto;max-height:100%;object-fit:contain;display:block;margin:0 auto}
.cfr .cl{font-size:10px;font-weight:600;margin-top:0;text-transform:uppercase;letter-spacing:.5px;padding-bottom:6px}
.card.normal .cfr{background:#f0f0f0}.card.normal .cfr .cl{color:#888}
.card.gold .cfr{background:linear-gradient(145deg,#FFF9E0 0%,#FFE680 50%,#FFD700 100%);border-color:var(--gdd);animation:gp 1.5s ease-in-out infinite}
.card.gold .cfr .cl{color:var(--gdd);font-weight:700}
@keyframes gp{0%,100%{box-shadow:0 0 10px rgba(255,215,0,.3)}50%{box-shadow:0 0 30px rgba(255,215,0,.6),0 0 60px rgba(255,215,0,.2)}}
.card.gold.flipped .ci::after{content:'';position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,.4)0%,transparent 70%);animation:bg .6s ease-out forwards;pointer-events:none;z-index:10}
@keyframes bg{0%{transform:scale(0);opacity:1}100%{transform:scale(2.5);opacity:0}}
.card:active:not(.flipped):not(.disabled) .ci{transform:scale(.95)}
.card.re .ci{opacity:.65}.card.gold.re .ci{opacity:1}
.ov{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.ov.show{display:flex;animation:fo .4s ease-out}
@keyframes fo{from{opacity:0}to{opacity:1}}
.rc{border-radius:24px;padding:34px 26px;text-align:center;max-width:310px;width:90%;animation:pi .5s cubic-bezier(.34,1.56,.64,1)}
.rc.win{background:linear-gradient(160deg,#FFF9E0 0%,var(--yd) 100%);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 80px rgba(255,215,0,.3)}
.rc.lose{background:linear-gradient(160deg,#fff 0%,#f0f0f0 100%);box-shadow:0 20px 60px rgba(0,0,0,.4)}
@keyframes pi{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.re{font-size:52px;margin-bottom:8px}.win .re{animation:bn 1s ease-in-out infinite}
@keyframes bn{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.rt{font-family:'Lilita One',sans-serif;font-size:24px;margin-bottom:6px}
.win .rt{color:var(--dk)}.lose .rt{color:#8B0000}
.rx{font-size:13px;color:#555;margin-bottom:20px;line-height:1.4}
.btn{background:linear-gradient(135deg,var(--dk),var(--gn));color:#fff;border:none;padding:13px 34px;border-radius:50px;font-family:'Fredoka',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;box-shadow:0 4px 20px rgba(45,80,22,.4);transition:transform .2s}
.btn:active{transform:scale(.95)}
.cc{position:fixed;inset:0;pointer-events:none;z-index:101;overflow:hidden}
.co{position:absolute;width:10px;height:10px;top:-10px;animation:cof linear forwards}
@keyframes cof{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes ms{0%,100%{transform:rotateY(180deg) translateX(0)}20%{transform:rotateY(180deg) translateX(-5px)}40%{transform:rotateY(180deg) translateX(5px)}60%{transform:rotateY(180deg) translateX(-4px)}80%{transform:rotateY(180deg) translateX(3px)}}
.card.msh .ci{animation:ms .4s ease-in-out}
</style>
</head>

const NORM_SVG=`<span style="font-size:min(14vw,56px);line-height:1">🧉</span>`;
let att=0,gf=0,go=false,gs=null;
function gen(){
  const w=Math.random()<WP;
  const c=[];for(let i=0;i<T;i++)c.push({type:'normal',rev:false});
  if(w)return{cards:c,win:true,gp:[]};
  const gp=[];
  while(gp.length<G){const p=Math.floor(Math.random()*T);if(!gp.includes(p)){gp.push(p);c[p].type='gold'}}
  return{cards:c,win:false,gp}
}
function mkCard(i){
  const d=document.createElement('div');d.className='card';d.dataset.i=i;
  d.innerHTML=`<div class="ci"><div class="cf cb"><span class="qm">¿?</span><span class="th">tocá</span></div><div class="cf cfr"><span class="ic"></span><span class="cl"></span></div></div>`;
  d.addEventListener('click',()=>flip(d,i));return d
}
function flip(el,i){
  if(go||el.classList.contains('flipped')||el.classList.contains('disabled'))return;
  att++;
  let isG=false;
  if(gs.win){isG=true;gs.cards[i].type='gold'}
  else{isG=gs.cards[i].type==='gold'}
  gs.cards[i].rev=true;
  const ic=el.querySelector('.ic'),cl=el.querySelector('.cl');
  if(isG){el.classList.add('gold');ic.innerHTML=`<img class="cimg" src="${GOLD_IMG}" alt="Mate de Oro">`;cl.textContent='¡Mate de Oro!';gf++}
  else{el.classList.add('normal');ic.innerHTML=NORM_SVG;cl.textContent='Mate común';setTimeout(()=>el.classList.add('msh'),500);setTimeout(()=>el.classList.remove('msh'),900)}
  el.classList.add('flipped');
  updAtt(isG);
  if(!isG){go=true;disAll();setTimeout(revAll,800);setTimeout(()=>showR(false),1800)}
  else if(gf>=G){go=true;disAll();setTimeout(()=>showR(true),700)}
}
function updAtt(g){const e=document.getElementById('a'+att);if(g){e.classList.add('gold');e.textContent='🧉'}else{e.classList.add('used');e.textContent='✖'}}
function disAll(){document.querySelectorAll('.card:not(.flipped)').forEach(c=>c.classList.add('disabled'))}
function revAll(){
  if(!gs.win){document.querySelectorAll('.card').forEach((el,i)=>{
    if(gs.cards[i].type==='gold'&&!gs.cards[i].rev){
      const ic=el.querySelector('.ic'),cl=el.querySelector('.cl');
      el.classList.add('gold');ic.innerHTML=`<img class="cimg" src="${GOLD_IMG}" alt="Mate de Oro">`;cl.textContent='¡Mate de Oro!';
      el.classList.add('flipped','re')}})}
}
function showR(w){
  const o=document.getElementById('ov'),c=document.getElementById('rcard'),e=document.getElementById('remoji'),t=document.getElementById('rtitle'),x=document.getElementById('rtext');
  c.className='rc '+(w?'win':'lose');
  if(w){e.textContent='🧉✨🏆';t.textContent='¡Ganaste!';x.textContent='¡Encontraste los 3 mates de oro!';confetti()}
  else{e.textContent='😢';t.textContent='¡Casi!';x.innerHTML='Encontraste '+gf+' de 3 mates de oro.<br>¡Intentá de nuevo!'}
  o.classList.add('show')
}
function confetti(){
  const c=document.getElementById('cc');c.innerHTML='';
  const cols=['#FFD700','#2D5016','#F5C518','#fff','#3A6B1E','#B8860B'];
  for(let i=0;i<60;i++){const p=document.createElement('div');p.className='co';const s=6+Math.random()*10;
  p.style.width=s+'px';p.style.height=s+'px';p.style.left=Math.random()*100+'%';
  p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.borderRadius=Math.random()>.5?'50%':'2px';
  p.style.animationDuration=(1.5+Math.random()*2.5)+'s';p.style.animationDelay=Math.random()+'s';c.appendChild(p)}
  setTimeout(()=>{c.innerHTML=''},5000)
}
function restart(){
  att=0;gf=0;go=false;
  document.getElementById('ov').classList.remove('show');
  document.getElementById('cc').innerHTML='';
  for(let i=1;i<=3;i++){const e=document.getElementById('a'+i);e.className='adot';e.textContent='❓'}
  init()
}
function init(){gs=gen();const g=document.getElementById('grid');g.innerHTML='';for(let i=0;i<T;i++)g.appendChild(mkCard(i))}
init();
</script>
